<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert AI Trading Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold mb-8 text-center">Albert AI Trading Bot Dashboard</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Trading Status Card -->
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-semibold mb-4">Trading Status</h2>
                <div id="tradingStatus" class="space-y-2">
                    <p>Status: <span id="botStatus" class="font-bold text-green-500">Active</span></p>
                    <p>Active Trading Pairs: <span id="activePairs">BTC/USDT, ETH/USDT</span></p>
                    <p>Max Trade Amount: <span id="maxTradeAmount">$100</span></p>
                </div>
            </div>
            
            <!-- Performance Chart -->
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-semibold mb-4">Performance Metrics</h2>
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
        
        <!-- Real-time Trade Log -->
        <div class="mt-8 bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-semibold mb-4">Recent Trades</h2>
            <div id="tradeLog" class="overflow-y-auto max-h-64">
                <!-- Trade logs will be dynamically populated -->
            </div>
        </div>
    </div>

    <script>
        // WebSocket for real-time updates
        const socket = new WebSocket('ws://localhost:10000/ws');
        
        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            updateDashboard(data);
        };

        function updateDashboard(data) {
            // Update trading status
            document.getElementById('botStatus').textContent = data.status;
            document.getElementById('activePairs').textContent = data.trading_pairs.join(', ');
            
            // Add trade log entry
            const tradeLog = document.getElementById('tradeLog');
            const logEntry = document.createElement('div');
            logEntry.classList.add('mb-2', 'p-2', 'bg-gray-700', 'rounded');
            logEntry.textContent = `Trade Update: ${new Date(data.timestamp).toLocaleString()}`;
            tradeLog.prepend(logEntry);
        }

        // Performance Chart
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const performanceChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Portfolio Value',
                    data: [1000, 1200, 1100, 1350, 1500, 1600],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: 'white'
                        }
                    },
                    x: {
                        ticks: {
                            color: 'white'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
