services:
- type: web
  name: albert-trading-bot
  env: python
  region: us-west
  branch: main
  runtime: python3.9
  buildCommand: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install setuptools wheel
    python src/cpp/setup.py build_ext --inplace
  startCommand: |
    gunicorn --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 120 deploy:app
  envVars:
    - key: PYTHON_VERSION
      value: 3.9.7
    
    # Cryptocurrency Exchange API Credentials (IMPORTANT: Set these in Render Dashboard)
    - key: COINDCX_API_KEY
      sync: false
    - key: COINDCX_SECRET_KEY
      sync: false
    
    # Security Settings
    - key: SECRET_KEY
      generateValue: true
    - key: DEBUG
      value: false
    
    # Machine Learning Model Configuration
    - key: MODEL_PATH
      value: /opt/albert/models/trading_model.h5
    
    # Trading Configuration
    - key: TRADING_ENABLED
      value: false
    - key: MAX_TRADE_AMOUNT
      value: 1000
    - key: RISK_TOLERANCE
      value: 0.02
    
    # Logging and Monitoring
    - key: LOG_LEVEL
      value: INFO
    - key: SENTRY_DSN
      sync: false
    
    # Performance Optimization
    - key: CACHE_BACKEND
      value: redis
    - key: GUNICORN_WORKERS
      value: 4
    - key: GUNICORN_WORKER_CLASS
      value: uvicorn.workers.UvicornWorker
    - key: GUNICORN_TIMEOUT
      value: 120
    
    # Memory and CPU Optimization
    - key: PYTHONOPTIMIZE
      value: 2
    
    # Compliance and Security
    - key: COMPLIANCE_CHECK_ENABLED
      value: true
    - key: RATE_LIMIT_REQUESTS
      value: 100
    - key: RATE_LIMIT_WINDOW
      value: 60
    
    # Render Configuration
    - key: PORT
      fromService:
        type: web
        name: albert-trading-bot
        property: port
    
  plan: starter
  autoDeploy: true
  healthCheckPath: /health
  disk:
    name: logs
    mountPath: /logs
    sizeGB: 1

