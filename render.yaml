services:
- type: web
  name: albert-trading-bot
  env: python
  region: us-west
  branch: main
  runtime: python3.10.12
  
  # Build Triggers Configuration
  buildTriggers:
    - paths:
        included:
          - deploy.py
          - requirements.txt
          - src/trading/**
          - config/**
          - static/js/trading.js
          - .env.example
          - runtime.txt
        ignored:
          - docs/**
          - tests/**
          - '*.md'
          - .git/**
          - '*.log'
  
  buildCommand: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install setuptools wheel
    python src/cpp/setup.py build_ext --inplace
  startCommand: |
    gunicorn --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 180 deploy:app
  envVars:
    - key: PYTHON_VERSION
      value: 3.10.12
    
    # Cryptocurrency Exchange API Credentials (IMPORTANT: Set these in Render Dashboard)
    - key: COINDCX_API_KEY
      sync: false
    - key: COINDCX_SECRET_KEY
      sync: false
    
    # Security Settings
    - key: SECRET_KEY
      generateValue: true
    - key: DEBUG
      value: false
    - key: ENCRYPTION_SALT
      generateValue: true
    
    # Machine Learning Model Configuration
    - key: MODEL_PATH
      value: /opt/albert/models/trading_model.h5
    - key: PREDICTION_CONFIDENCE_THRESHOLD
      value: 0.75
    
    # Trading Configuration
    - key: TRADING_ENABLED
      value: false
    - key: TRADING_STRATEGY
      value: machine_learning
    - key: EXCHANGE_NAME
      value: binance
    - key: TRADING_PAIR
      value: BTC/USDT
    - key: MAX_TRADE_AMOUNT
      value: 1000
    - key: RISK_TOLERANCE
      value: 0.02
    
    # Logging and Monitoring
    - key: LOG_LEVEL
      value: INFO
    - key: LOG_FILE_PATH
      value: /tmp/albert_trading_bot.log
    - key: SENTRY_DSN
      sync: false
    
    # Performance Optimization
    - key: CACHE_BACKEND
      value: redis
    - key: USE_CPP_MODULES
      value: true
    - key: ENABLE_GPU_ACCELERATION
      value: false
    
    # Monitoring Alerts
    - key: TELEGRAM_ALERT_BOT_TOKEN
      sync: false
    - key: TELEGRAM_CHAT_ID
      sync: false
    
    # Render Specific
    - key: PORT
      value: 10000
    - key: RENDER
      value: true
    
  plan: starter
  autoDeploy: true
  healthCheckPath: /health
  disk:
    name: logs
    mountPath: /logs
    sizeGB: 1

databases:
- name: albert-trading-bot-redis
  plan: free
  ipAllowList: []  # Restrict access as needed
